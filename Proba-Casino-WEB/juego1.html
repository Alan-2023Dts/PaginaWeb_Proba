<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falacia del Jugador - Proba Casino</title>
    <!-- CSS en assets/css -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/juego1.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div class="logo">PROBA<span>CASINO</span></div>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="index.html#games">Juegos</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="game-header">
            <h1>La Falacia del Jugador</h1>
            <p class="myth-box">"Si sale Cara 5 veces, la próxima ¡DEBE ser Cruz!" <br><strong>¿Realidad o Mito?</strong></p>
        </section>

        <div class="game-layout">
            <!-- Panel Izquierdo: Controles y Moneda -->
            <div class="game-main">
                <div class="bet-controls">
                    <h3>Elige tu opción:</h3>
                    <div class="options">
                        <button id="btn-heads" class="btn-option active">Cara</button>
                        <button id="btn-tails" class="btn-option">Cruz</button>
                    </div>
                </div>

                <div class="coin-container">
                    <div id="coin" class="coin">
                        <div class="side heads"><span>C</span></div>
                        <div class="side tails"><span>X</span></div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button id="toss-1" class="btn-primary">Lanzar 1 vez</button>
                    <button id="toss-20" class="btn-secondary">Lanzar 20 veces</button>
                    <button id="reset" class="btn-danger">Reiniciar</button>
                </div>

                <div id="educational-msg" class="info-bubble">
                    Haz clic en lanzar para empezar a probar la probabilidad.
                </div>
            </div>

            <!-- Panel Derecho: Estadísticas -->
            <div class="game-stats">
                <div class="stat-card">
                    <h3>Aciertos</h3>
                    <div id="stat-wins" class="stat-value">0</div>
                </div>
                <div class="stat-card">
                    <h3>Cara</h3>
                    <div id="stat-heads" class="stat-value">0</div>
                    <div class="prob-bar"><div id="bar-heads" style="width: 50%"></div></div>
                </div>
                <div class="stat-card">
                    <h3>Cruz</h3>
                    <div id="stat-tails" class="stat-value">0</div>
                    <div class="prob-bar"><div id="bar-tails" style="width: 50%"></div></div>
                </div>
            </div>
        </div>

        <!-- Historial Animado -->
        <section class="history-section">
            <h3>Historial de Lanzamientos</h3>
            <div id="history-list" class="history-list">
                <!-- Los resultados aparecerán aquí -->
                <p class="empty-msg">No hay lanzamientos aún</p>
            </div>
        </section>
    </main>

    <!-- JS en assets/js -->
    <script src="assets/js/juego1.js"></script>
</body>
</html>
